name: Deploy Front

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for Vite
        run: |
          echo "VITE_API_URL=http://${{ vars.SSH_HOST_BACK }}/api" >> .env
          echo "VITE_STRIPE_PUBLIC_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to VPS Front
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST_FRONT }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/app/front"
          strip_components: 1
